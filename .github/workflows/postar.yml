name: Postar oferta Shopee no Telegram

# O robô roda a cada 10 minutos e decide sozinho, com base no relógio real,
# se algum dos horários-alvo do dia (definidos em main.py) já venceu e
# ainda não foi postado. Esse modelo é muito mais resistente a atrasos do
# GitHub do que usar um horário de cron fixo para cada post individual.
#
# Faixa de horários cobrindo 05h-23h de Brasília (UTC-3) = 08h-02h em UTC.
on:
  schedule:
    - cron: "*/10 0-2,8-23 * * *"
  workflow_dispatch: {}  # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write  # necessário para o robô salvar o arquivo de controle (estado.json)

# Impede que 2 execuções rodem ao mesmo tempo (ex: o schedule do GitHub e
# o cron-job.org disparando juntos). Se uma nova tentar começar enquanto
# outra ainda está rodando, ela fica na fila em vez de rodar em paralelo
# — evita conflito ao salvar o estado.json e posts duplicados.
concurrency:
  group: postar-shopee-telegram
  cancel-in-progress: false

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script de postagem
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHOPEE_KEYWORD: ""
        run: python main.py

      - name: Salvar estado (horários e produtos já postados)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "Atualiza estado de postagens"
          git pull --rebase
          git push

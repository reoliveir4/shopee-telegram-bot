name: Postar oferta Shopee no Telegram

on:
  schedule:
    # Roda às 12:00 e às 18:00 (horário UTC = 09:00 e 15:00 em Brasília)
    # Ajuste os horários como quiser: https://crontab.guru
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}  # permite rodar manualmente pelo botão "Run workflow"

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script de postagem
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPEE_KEYWORD: "promocao"
        run: python main.py
